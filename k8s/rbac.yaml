apiVersion: v1
kind: ServiceAccount
metadata:
  name: meta-router
  labels:
    app: meta-router
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: meta-router
  labels:
    app: meta-router
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: meta-router
  labels:
    app: meta-router
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: meta-router
subjects:
- kind: ServiceAccount
  name: meta-router
