# Example configuration for external processor
# This shows all available configuration options
# Configuration can be provided via:
# - This YAML file (use --config flag)
# - Command-line flags
# - Environment variables (prefix with EXTPROC_)

# gRPC server port for Envoy ext_proc
grpc-port: 9001

# Metrics server port (Prometheus format)
metrics-port: 9090

# Pod selector configuration (label selector for model server pods)
# Supports same format as Kubernetes Service selectors
pod-selector:
  app: model-server
  # Additional labels can be added as needed
  # tier: inference

# Node selector configuration (label selector for GPU nodes)
# Only scrape VRAM metrics from nodes matching these labels
node-selector:
  kubernetes.io/gpu: "true"
  # Additional labels can be added as needed
  # gpu-type: rocm

# Namespace to watch for model server pods
namespace: llm

# GPU metrics exporter pod discovery configuration
exporter-namespace: kube-system
exporter-pod-selector:
  app: amd-gpu-metrics-exporter-amdgpu-metrics-exporter

# How often to scrape VRAM metrics from nodes
scrape-interval: 30s

# Endpoint to call on model server pods to load a new model
model-load-endpoint: /v1/models/load

# Kubeconfig path (optional, uses in-cluster config if not specified)
# kubeconfig: /path/to/kubeconfig

# ===== OpenTelemetry Configuration =====

# OTLP endpoint for traces and metrics (e.g., "localhost:4317", "otel-collector:4317")
# Leave empty to disable OTLP export
# otlp-endpoint: ""

# Enable OTLP trace export (requires otlp-endpoint to be set)
otlp-traces-enabled: false

# Enable OTLP metrics export (requires otlp-endpoint to be set)
otlp-metrics-enabled: false

# Enable Prometheus metrics export (default: true)
prometheus-enabled: true

# Enable Go runtime instrumentation (goroutines, memory, GC stats)
runtime-instrumentation-enabled: true

# Enable host instrumentation (CPU, memory, network I/O)
host-instrumentation-enabled: true

# Metric collection interval for OTLP periodic reader
metric-interval: 10s
