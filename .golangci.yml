---
formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
    - golines
  exclusions:
    generated: strict
    paths:
      - zz_generated.*\.go$
      - vendor/*
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - dot
        - default
        - prefix(github.com/randomvariable/rocm-envoy-ai-gateway-external-processor)
    golines:
      max-len: 180
issues:
  max-same-issues: 0
linters:
  disable:
    - depguard
    - exhaustruct
    - gochecknoglobals
    - gochecknoinits
    - lll
    - nonamedreturns
    - tagliatelle
    - testpackage
    - wsl
  enable:
    - goheader
  default: all
  exclusions:
    generated: strict
    warn-unused: true
    paths:
      - zz_generated.*\.go$
      - .*_mock\.go
    rules:
      - text: parameter '(resp|req|ctx)' seems to be unused
        linters:
          - revive
      - text: "unknown option \"(inline|omitzero)\""
        linters:
          - revive
      - text: declaration of "err" shadows declaration
        linters:
          - govet
      - path: _test\.go$
        linters:
          - err113
          - forbidigo
          - funlen
          - gosec
          - noctx
          - mnd
  settings:
    goheader:
      template: |-
        Copyright 2026 Naadir Jeewa

        Licensed under the Apache License, Version 2.0 (the "License");
        you may not use this file except in compliance with the License.
        You may obtain a copy of the License at

            http://www.apache.org/licenses/LICENSE-2.0

        Unless required by applicable law or agreed to in writing, software
        distributed under the License is distributed on an "AS IS" BASIS,
        WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.
        See the License for the specific language governing permissions and
        limitations under the License.

        SPDX-License-Identifier: Apache-2.0
    forbidigo:
      forbid:
        - pattern: '^(\w+\.)?Update$'
          pkg: '^sigs\.k8s\.io/controller-runtime/pkg/client$'
          msg: Use Client.Patch instead of Client.Update to prevent race conditions
        - pattern: '^(\w+\.)?CreateOrUpdate$'
          pkg: '^sigs\.k8s\.io/controller-runtime/pkg/controller/controllerutil$'
          msg: Use CreateOrPatch instead of CreateOrUpdate to prevent race conditions
      analyze-types: true
    godox:
      keywords:
        - BUG
        - FIXME
        - OPTIMIZE
        - HACK
    cyclop:
      max-complexity: 12
    exhaustive:
      default-signifies-exhaustive: true
    funlen:
      lines: 120
      statements: 120
    gocritic:
      enable-all: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    importas:
      alias:
        - alias: corev1
          pkg: k8s.io/api/core/v1
        - alias: apierrors
          pkg: k8s.io/apimachinery/pkg/api/errors
        - alias: metav1
          pkg: k8s.io/apimachinery/pkg/apis/meta/v1
        - alias: apimachinerytypes
          pkg: k8s.io/apimachinery/pkg/types
        - alias: kerrors
          pkg: k8s.io/apimachinery/pkg/util/errors
        - alias: clientgoscheme
          pkg: k8s.io/client-go/kubernetes/scheme
        - alias: inferencev1
          pkg: sigs.k8s.io/gateway-api-inference-extension/api/v1
        - alias: ctrl
          pkg: sigs.k8s.io/controller-runtime
        - alias: crclient
          pkg: sigs.k8s.io/controller-runtime/pkg/client
        - alias: logf
          pkg: sigs.k8s.io/controller-runtime/pkg/log
      no-unaliased: true
    ireturn:
      allow:
        - (or|er)$
        - anon
        - empty
        - error
        - k8s.io/apimachinery/pkg/runtime.Object
        - sigs.k8s.io/controller-runtime/pkg/client.Client
        - sigs.k8s.io/controller-runtime/pkg/client.Object
        - stdlib
    revive:
      enable-all-rules: true
      rules:
        - name: line-length-limit
          disabled: true
        - name: cognitive-complexity
          disabled: true
        - name: cyclomatic
          disabled: true
        - name: add-constant
          disabled: true
        - name: exported
          disabled: true
        - name: dot-imports
          disabled: true
        - name: package-comments
          disabled: true
        - name: function-length
          disabled: true
        - name: blank-imports
          disabled: true
        - name: max-public-structs
          disabled: true
        - name: confusing-results
          disabled: true
        - name: import-alias-naming
          disabled: true
        - name: unused-receiver
          disabled: true
        - name: deep-exit
          disabled: true
        - name: flag-parameter
          disabled: true
        - name: comment-spacings
          disabled: true
    testifylint:
      enable-all: true
    varnamelen:
      ignore-names:
        - b
        - c
        - cc
        - cm
        - d
        - e
        - err
        - f
        - g
        - i
        - id
        - ip
        - k
        - l
        - ns
        - ok
        - p
        - r
        - s
        - t
        - tc
        - tt
        - v
        - wg
run:
  timeout: 10m
version: "2"
