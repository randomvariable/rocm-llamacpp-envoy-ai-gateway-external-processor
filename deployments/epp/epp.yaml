apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-processor
  namespace: llm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-processor
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "update", "delete", "patch"]
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-processor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-processor
subjects:
- kind: ServiceAccount
  name: external-processor
  namespace: llm
---
# EndpointPickerConfig - configures scoring plugins and their weights.
apiVersion: v1
kind: ConfigMap
metadata:
  name: external-processor-config
  namespace: llm
data:
  epp-config.yaml: |
    apiVersion: inference.networking.x-k8s.io/v1alpha1
    kind: EndpointPickerConfig
    plugins:
      - type: queue-scorer
      - type: kv-cache-utilization-scorer
      - type: vram-scorer
        parameters:
          thresholdGB: 4
      - type: model-loader
        parameters:
          modelServerPort: 8080
          modelLoadEndpoint: "/models/load"
          modelLoadTimeoutSeconds: 600
    schedulingProfiles:
      - name: default
        plugins:
          - pluginRef: queue-scorer
            weight: 2
          - pluginRef: kv-cache-utilization-scorer
            weight: 2
          - pluginRef: vram-scorer
            weight: 3
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-processor
  namespace: llm
  labels:
    app: external-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: external-processor
  template:
    metadata:
      labels:
        app: external-processor
    spec:
      serviceAccountName: external-processor
      containers:
      - name: external-processor
        image: ghcr.io/randomvariable/rocm-llamacpp-envoy-ai-gateway-external-processor:latest
        imagePullPolicy: Always
        args:
        - --pool-name=llm-pool
        - --pool-namespace=llm
        - --grpc-port=9001
        - --metrics-port=9090
        - --secure-serving
        - --cert-path=/etc/extproc/tls
        - --config-file=/etc/epp/epp-config.yaml
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: EXTPROC_NAMESPACE
          value: llm
        - name: EXTPROC_EXPORTER_NAMESPACE
          value: kube-system
        - name: EXTPROC_SCRAPE_INTERVAL
          value: "30s"
        ports:
        - name: grpc
          containerPort: 9001
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 100m
        livenessProbe:
          grpc:
            port: 9003
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          grpc:
            port: 9003
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: tls-certs
          mountPath: /etc/extproc/tls
          readOnly: true
        - name: epp-config
          mountPath: /etc/epp
          readOnly: true
      volumes:
      - name: tls-certs
        secret:
          secretName: external-processor-tls
      - name: epp-config
        configMap:
          name: external-processor-config
---
apiVersion: v1
kind: Service
metadata:
  name: external-processor
  namespace: llm
  labels:
    app: external-processor
spec:
  type: ClusterIP
  selector:
    app: external-processor
  ports:
  - name: grpc
    port: 9001
    targetPort: 9001
  - name: metrics
    port: 9090
    targetPort: 9090
