apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-processor
  namespace: llm
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: external-processor
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["inference.networking.k8s.io"]
  resources: ["inferencepools"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: external-processor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: external-processor
subjects:
- kind: ServiceAccount
  name: external-processor
  namespace: llm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-processor
  namespace: llm
  labels:
    app: external-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: external-processor
  template:
    metadata:
      labels:
        app: external-processor
    spec:
      serviceAccountName: external-processor
      containers:
      - name: external-processor
        image: external-processor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: grpc
          containerPort: 9001
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        args:
        - --grpc-port=9001
        - --metrics-port=9090
        - --namespace=llm
        - --exporter-namespace=kube-system
        - --exporter-pod-selector=app=amd-gpu-metrics-exporter-amdgpu-metrics-exporter
        - --scrape-interval=30s
        resources:
          limits:
            memory: 512Mi
            cpu: 500m
          requests:
            memory: 256Mi
            cpu: 100m
        livenessProbe:
          httpGet:
            path: /healthz
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: external-processor
  namespace: llm
  labels:
    app: external-processor
spec:
  type: ClusterIP
  selector:
    app: external-processor
  ports:
  - name: grpc
    port: 9001
    targetPort: 9001
  - name: metrics
    port: 9090
    targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: external-processor-metrics
  namespace: llm
  labels:
    app: external-processor
spec:
  type: ClusterIP
  selector:
    app: external-processor
  ports:
  - name: metrics
    port: 9090
    targetPort: 9090
