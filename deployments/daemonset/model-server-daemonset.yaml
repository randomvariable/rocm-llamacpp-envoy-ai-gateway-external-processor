# Example Model Server DaemonSet
# This is an example configuration for deploying model servers on GPU nodes.
# Replace the model server image with your preferred implementation that supports:
# - /v1/models - List loaded models
# - /v1/models/load - Load a new model
apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: model-server
  namespace: llm
  labels:
    app: model-server
spec:
  selector:
    matchLabels:
      app: model-server
  template:
    metadata:
      labels:
        app: model-server
    spec:
      nodeSelector:
        # Only run on nodes with GPU
        kubernetes.io/gpu: "true"
      hostNetwork: true
      containers:
      # Replace with your preferred model server image
      - name: model-server
        image: ghcr.io/ggerganov/llama.cpp:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            amd.com/gpu: 1
          requests:
            amd.com/gpu: 1
            memory: 32Gi
        volumeMounts:
        - name: models
          mountPath: /models
        - name: dev-kfd
          mountPath: /dev/kfd
        - name: dev-dri
          mountPath: /dev/dri
        command:
        - /llama-server
        args:
        - --host
        - "0.0.0.0"
        - --port
        - "8080"
        - --models-path
        - /models
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
      # ROCm SMI exporter for VRAM metrics
      - name: rocm-smi-exporter
        image: rocm/rocm-smi-exporter:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: metrics
          containerPort: 9400
          protocol: TCP
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev-kfd
          mountPath: /dev/kfd
        - name: dev-dri
          mountPath: /dev/dri
        resources:
          limits:
            memory: 256Mi
          requests:
            memory: 128Mi
      volumes:
      - name: models
        hostPath:
          path: /var/lib/models
          type: DirectoryOrCreate
      - name: dev-kfd
        hostPath:
          path: /dev/kfd
      - name: dev-dri
        hostPath:
          path: /dev/dri
---
apiVersion: v1
kind: Service
metadata:
  name: model-server
  namespace: llm
  labels:
    app: model-server
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  selector:
    app: model-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9400
    targetPort: 9400
