# Example llama.cpp DaemonSet for AMD ROCm GPU nodes.
# Models are distributed as OCI image volumes and mounted into the container.
# Adjust the nodeSelector, model images, and resource limits for your hardware.
apiVersion: v1
kind: Namespace
metadata:
  name: llm
---
# Model configuration for llama-server --models-preset
apiVersion: v1
kind: ConfigMap
metadata:
  name: llamacpp-models-config
  namespace: llm
data:
  config.ini: |
    # Add model presets here.
    # See llama-server --help for format.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: llamacpp-model-server
  namespace: llm
  labels:
    app: llamacpp-model-server
spec:
  selector:
    matchLabels:
      app: llamacpp-model-server
  template:
    metadata:
      labels:
        app: llamacpp-model-server
    spec:
      hostIPC: true
      hostNetwork: true
      nodeSelector:
        # Select nodes by AMD GPU device ID. Example: 1586 = Strix Halo.
        amd.com/gpu.device-id: "1586"
      tolerations:
      - key: amd.com/gpu
        operator: Exists
        effect: NoSchedule
      - key: gpu.amd.com/gpu
        operator: Exists
        effect: NoSchedule
      securityContext:
        supplementalGroups: [39, 105]
      containers:
      - name: llamacpp
        image: docker.io/kyuz0/amd-strix-halo-toolboxes:rocm-7.2
        command: [llama-server]
        args:
        - --models-preset
        - /config/config.ini
        - --models-max
        - "1"
        - --host
        - 0.0.0.0
        - --port
        - "8080"
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        resources:
          requests:
            cpu: "4"
            memory: 32Gi
          limits:
            amd.com/gpu: "1"
            memory: 48Gi
        volumeMounts:
        - name: config
          mountPath: /config
          readOnly: true
        # Mount model volumes here. Each model is an OCI image volume
        # containing the GGUF file.
        - name: models-qwen3-coder
          mountPath: /models/qwen3-coder
        - name: shm
          mountPath: /dev/shm
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: llamacpp-models-config
      # Models as OCI image volumes. Replace with your own model images.
      - name: models-qwen3-coder
        image:
          reference: example.com/models/qwen3-coder-30b-a3b:Q4_K_M
          pullPolicy: Always
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 8Gi
---
apiVersion: v1
kind: Service
metadata:
  name: llamacpp-model-server
  namespace: llm
  labels:
    app: llamacpp-model-server
spec:
  type: ClusterIP
  clusterIP: None  # Headless service
  selector:
    app: llamacpp-model-server
  ports:
  - name: http
    port: 8080
    targetPort: 8080
