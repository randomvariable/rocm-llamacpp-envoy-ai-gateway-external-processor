apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: llm-pool
  namespace: llm
  labels:
    app: model-server
spec:
  # Selector for model server pods
  selector:
    matchLabels:
      app: model-server

  # Ports exposed by model servers
  targetPorts:
    - number: 8080
      name: http

  # Reference to the external processor
  endpointPickerRef:
    name: external-processor
    kind: Service
    port: 9001
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inference-route
  namespace: llm
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: inference-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool
          name: llm-pool
